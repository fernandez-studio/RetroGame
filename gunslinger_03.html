<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OK FERNAND</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    .title {
      color: #FFD700;
      font-size: 36px;
      letter-spacing: 12px;
      text-shadow: 4px 4px 0px #7A3A00;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="start-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:100;cursor:pointer">
    <div style="color:#FFD700;font-family:'Courier New',monospace;font-size:28px;letter-spacing:8px;text-shadow:3px 3px 0 #7A3A00">CLICK TO START</div>
  </div>

  <div style="position:relative;width:1488px;margin-bottom:18px;height:44px">
    <div id="ammo-meter" style="display:flex;flex-direction:row;align-items:flex-end;gap:5px;margin-left:38px;height:100%"></div>
    <div class="title" style="position:absolute;left:38px;width:1440px;text-align:center;top:50%;transform:translateY(-50%)">* OK FERNAND *</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="color:#FF5555;font-size:11px;letter-spacing:3px;font-family:'Courier New',monospace">HP</div>
      <div style="width:22px;height:384px;background:#1a1a1a;border:2px solid #555;border-radius:3px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end">
        <div id="health-fill" style="width:100%;height:100%;background:#CC2222"></div>
      </div>
    </div>
    <canvas id="game" width="1440" height="960"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx    = canvas.getContext('2d');
    const S = 6; // 1 game pixel = 6 screen pixels  →  arena is 240 × 160 game pixels

    // ── Primitives ───────────────────────────────────────────────────────────────

    function dot(gx, gy, color) {
      ctx.fillStyle = color;
      ctx.fillRect(gx * S, gy * S, S, S);
    }

    function grect(gx, gy, gw, gh, color) {
      ctx.fillStyle = color;
      ctx.fillRect(gx * S, gy * S, gw * S, gh * S);
    }

    function drawSprite(sprite, palette, gx, gy, flipX = false, scale = 1, damage = null) {
      const rows = sprite.length;
      const cols = sprite[0].length;
      const ps   = S * scale;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (damage && !damage[r][c]) continue;
          const key = sprite[r][flipX ? (cols - 1 - c) : c];
          if (key !== null && palette[key]) {
            ctx.fillStyle = palette[key];
            ctx.fillRect(gx * S + c * ps, gy * S + r * ps, ps, ps);
          }
        }
      }
    }

    // ── Sprites ──────────────────────────────────────────────────────────────────

    // Wide-shot power-up: vertical bullet — 5 × 11
    const BULLET_PU = [

    // Tommy gun — 11 × 7  (horizontal, barrel pointing right)

    // Small tommy gun — in player's hand — 7 × 4, barrel pointing right

    const TELEPORT_PORTALS  = [{ x: 13, y: 147 }, { x: 227, y: 13 }];

    const TELEPORT_TRIGGER  = 9;    // radius² — triggers when player centre within 3px
    const TELEPORT_COOLDOWN = 90;   // frames before re-trigger after arriving

    const player = {
      x: 40, y: 73,
      facingLeft: false,
      animFrame: 0,   // 0=idle, 1=walk_A, 2=walk_B
      animTick: 0,
      tpState:    'idle',  // 'idle' | 'out' | 'in'
      tpTimer:    0,
      tpTarget:   0,
      tpAlpha:    1,
      tpCooldown: 0,
    };

    const COWBOY_FRAMES = [COWBOY, COWBOY_WALK_A, COWBOY_WALK_B];

    // ── Cactus damage ────────────────────────────────────────────────────────────

    const CACTUS_SCALE  = 1.2;
    const CHUNK_RADIUS  = 2.5; // vertical reach in sprite pixels per hit
    const HSCALE        = 7;   // horizontal squeeze — only ~1 column wide per hit

    function initDamage() {
      return Array.from({ length: CACTUS.length }, () =>
        new Array(CACTUS[0].length).fill(true)
      );
    }

    function applyChunk(damage, hitC, hitR, radius) {
      const r2 = radius * radius;
      for (let r = 0; r < damage.length; r++) {
        for (let c = 0; c < damage[0].length; c++) {
          const dr = r - hitR, dc = c - hitC;
          if (HSCALE * dc * dc + dr * dr <= r2) damage[r][c] = false;
        }
      }
    }

    function playerCollidesWithCacti(px, py) {
      const p1x = px + 1, p2x = px + 6;
      const p1y = py + 5, p2y = py + 13;
      for (const ca of cacti) {
        for (let r = 0; r < CACTUS.length; r++) {
          for (let c = 0; c < CACTUS[0].length; c++) {
            if (CACTUS[r][c] === null || !ca.damage[r][c]) continue;
            const cx1 = ca.x + c * CACTUS_SCALE;
            const cx2 = ca.x + (c + 1) * CACTUS_SCALE;
            const cy1 = ca.y + r * CACTUS_SCALE;
            const cy2 = ca.y + (r + 1) * CACTUS_SCALE;
            if (p1x < cx2 && p2x > cx1 && p1y < cy2 && p2y > cy1) return true;
          }
        }
      }
      return false;
    }

    function isCactusGone(damage) {
      for (let r = 0; r < CACTUS.length; r++)
        for (let c = 0; c < CACTUS[0].length; c++)
          if (CACTUS[r][c] !== null && damage[r][c]) return false;
      return true;
    }

    const cacti = [
      { x: 110, y: 20,  damage: initDamage() },
      { x: 117, y: 66,  damage: initDamage() },
      { x: 112, y: 112, damage: initDamage() },
    ];

    const BULLET_SPEED   = 2.5;  // game pixels per frame
    const BULLET_RANGE      = 128;  // ~53% of arena width (240)
    const LONG_BULLET_RANGE = 480;  // 2× screen width
    const FIRE_COOLDOWN     = 30;   // frames between shots
    const SPLIT_DIVERGE     = Math.PI / 9;  // 20° spread on ricochet split
    const COS_DIV = Math.cos(SPLIT_DIVERGE);
    const SIN_DIV = Math.sin(SPLIT_DIVERGE);

    const TOMMY_SHOT_COOLDOWN  = 5;   // frames between shots within a burst
    const TOMMY_BURST_COOLDOWN = 28;  // frames between bursts

    const bullets = [];
    let fireCooldown = 0;

    let weapon    = 'default';  // 'default' | 'tommy' | 'wide' | 'long'
    let ammoBoxes = 8;
    let burstShot = 0;

    const COS30 = Math.cos(Math.PI / 6);
    const SIN30 = Math.sin(Math.PI / 6);

    const tommyPickups = [
      { x: 48,  y: 111 },
      { x: 155, y: 111 },
      { x: 88,  y: 42  },
    ];

    const widePickups = [
      { x: 150, y: 42 },
      { x:  72, y: 95 },
    ];

    const longPickups = [
      { x: 190, y: 95  },
      { x:  30, y: 110 },
    ];

    const AI_STAND_Y     = 73;
    const AI_SIT_Y       = 76;   // 87 - 11 rows = 76
    const AI_DEAD_Y      = 83;   // nudged 3px lower to ground him visually
    const AI_FADE_FRAMES    = 60;
    const AI_RECOVER_FRAMES = 180;  // 3 seconds at 60fps

    const ai = {
      x: 192,
      y: AI_STAND_Y,
      state: 'alive',   // 'alive' | 'sitting' | 'dying' | 'dead'
      fadeAlpha: 1,
      fadeTick: 0,
      recoverTick: 0,
    };

    // ── Audio ────────────────────────────────────────────────────────────────────

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playPew() {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(700, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.12);
    }

    function playHit() {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.18);
      gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.18);
    }

    function playDeath() {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(320, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(35, audioCtx.currentTime + 0.9);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.9);
    }

    function playTeleportOut() {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(480, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function playDing() {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.18);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.18);
    }

    function playTeleportIn() {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(960, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }

    // ── Input ────────────────────────────────────────────────────────────────────

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup',   e => { keys[e.key] = false; });

    const startOverlay = document.getElementById('start-overlay');
    startOverlay.addEventListener('click', () => {
      audioCtx.resume();
      startOverlay.style.display = 'none';
    });

    const STICK_DEAD = 0.15;
    function getGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      for (const pad of pads) if (pad) return pad;
      return null;
    }

    // ── Update ───────────────────────────────────────────────────────────────────

    function update() {
      // ── Teleport state machine ───────────────────────────────────────────────────
      if (player.tpCooldown > 0) player.tpCooldown--;

      if (player.tpState === 'out') {
        player.tpTimer++;
        player.tpAlpha = 1 - player.tpTimer / TELEPORT_FRAMES;
        if (player.tpTimer >= TELEPORT_FRAMES) {
          const dest  = TELEPORT_PORTALS[player.tpTarget];
          player.x    = dest.x - 4;
          player.y    = dest.y - 8;
          player.tpState = 'in';
          player.tpTimer = 0;
          player.tpAlpha = 0;
          playTeleportIn();
        }
      } else if (player.tpState === 'in') {
        player.tpTimer++;
        player.tpAlpha = player.tpTimer / TELEPORT_FRAMES;
        if (player.tpTimer >= TELEPORT_FRAMES) {
          player.tpState    = 'idle';
          player.tpAlpha    = 1;
          player.tpCooldown = TELEPORT_COOLDOWN;
        }
      }

      if (player.tpState === 'idle') {
        const gp = getGamepad();
        if (gp && gp.buttons.some(b => b.pressed)) audioCtx.resume();

        // ── Movement ──────────────────────────────────────────────────────────────
        let dx = 0, dy = 0;
        if (keys['w'] || keys['W']) dy -= 1;
        if (keys['s'] || keys['S']) dy += 1;
        if (keys['a'] || keys['A']) dx -= 1;
        if (keys['d'] || keys['D']) dx += 1;
        if (gp) {
          const ax = gp.axes[0], ay = gp.axes[1];
          if (Math.abs(ax) > STICK_DEAD) dx = Math.max(-1, Math.min(1, dx + ax));
          if (Math.abs(ay) > STICK_DEAD) dy = Math.max(-1, Math.min(1, dy + ay));
        }

        const moving = dx !== 0 || dy !== 0;

        if (moving) {
          const len = Math.sqrt(dx * dx + dy * dy);
          const spd = SPEED / Math.SQRT2;
          dx = (dx / len) * spd;
          dy = (dy / len) * spd;

          const newX = Math.max(3, Math.min(228, player.x + dx));
          const newY = Math.max(3, Math.min(143, player.y + dy));
          if (!playerCollidesWithCacti(newX, newY)) {
            player.x = newX; player.y = newY;
          } else if (!playerCollidesWithCacti(newX, player.y)) {
            player.x = newX;
          } else if (!playerCollidesWithCacti(player.x, newY)) {
            player.y = newY;
          }

          if (dx < 0) player.facingLeft = true;
          if (dx > 0) player.facingLeft = false;

          player.animTick++;
          if (player.animTick >= ANIM_RATE) {
            player.animTick = 0;
            player.animFrame = player.animFrame === 1 ? 2 : 1;
          }
        } else {
          player.animFrame = 0;
          player.animTick  = 0;
        }

        // ── Teleport trigger ──────────────────────────────────────────────────────
        if (player.tpCooldown === 0) {
          const pcx = player.x + 4, pcy = player.y + 8;
          for (let i = 0; i < TELEPORT_PORTALS.length; i++) {
            const p = TELEPORT_PORTALS[i];
            const ddx = pcx - p.x, ddy = pcy - p.y;
            if (ddx * ddx + ddy * ddy < TELEPORT_TRIGGER) {
              player.tpState  = 'out';
              player.tpTimer  = 0;
              player.tpTarget = i === 0 ? 1 : 0;
              playTeleportOut();
              break;
            }
          }
        }

        // ── Tommy gun pickup ──────────────────────────────────────────────────────
        for (let i = tommyPickups.length - 1; i >= 0; i--) {
          const tp = tommyPickups[i];
          if (player.x + 8 > tp.x && player.x + 1 < tp.x + 11 &&
              player.y + 5 > tp.y && player.y + 13 < tp.y + 14) {
            tommyPickups.splice(i, 1);
            weapon    = 'tommy';
            ammoBoxes = 8;
            burstShot = 0;
            updateAmmoMeter();
            break;
          }
        }

        // ── Wide-shot pickup ─────────────────────────────────────────────────────
        for (let i = widePickups.length - 1; i >= 0; i--) {
          const wp = widePickups[i];
          if (player.x + 8 > wp.x && player.x + 1 < wp.x + 10 &&
              player.y + 5 > wp.y && player.y + 13 < wp.y + 14) {
            widePickups.splice(i, 1);
            weapon    = 'wide';
            ammoBoxes = 8;
            updateAmmoMeter();
            break;
          }
        }

        // ── Long-shot pickup ──────────────────────────────────────────────────────
        for (let i = longPickups.length - 1; i >= 0; i--) {
          const lp = longPickups[i];
          if (player.x + 8 > lp.x && player.x + 1 < lp.x + 10 &&
              player.y + 5 > lp.y && player.y + 13 < lp.y + 14) {
            longPickups.splice(i, 1);
            weapon    = 'long';
            ammoBoxes = 8;
            updateAmmoMeter();
            break;
          }
        }

        // ── Shooting ──────────────────────────────────────────────────────────────
        let sx = 0, sy = 0;
        if (keys['ArrowUp'])    sy -= 1;
        if (keys['ArrowDown'])  sy += 1;
        if (keys['ArrowLeft'])  sx -= 1;
        if (keys['ArrowRight']) sx += 1;
        if (gp) {
          if (gp.buttons[3].pressed) sy -= 1;  // Y = shoot up
          if (gp.buttons[0].pressed) sy += 1;  // A = shoot down
          if (gp.buttons[2].pressed) sx -= 1;  // X = shoot left
          if (gp.buttons[1].pressed) sx += 1;  // B = shoot right
          sx = Math.max(-1, Math.min(1, sx));
          sy = Math.max(-1, Math.min(1, sy));
          const rx = gp.axes[2] ?? 0, ry = gp.axes[3] ?? 0;
          if (Math.sqrt(rx * rx + ry * ry) > 0.7) {
            const snapped = Math.round(Math.atan2(ry, rx) / (Math.PI / 4)) * (Math.PI / 4);
            sx = Math.round(Math.cos(snapped));
            sy = Math.round(Math.sin(snapped));
          }
        }

        if (sx !== 0 || sy !== 0) {
          if (fireCooldown <= 0) {
            const len = Math.sqrt(sx * sx + sy * sy);
            const ndx = (sx / len) * BULLET_SPEED;
            const ndy = (sy / len) * BULLET_SPEED;
            const bx  = player.x + 4, by = player.y + 7;
            if (weapon === 'wide') {
              bullets.push({ x: bx, y: by, dx: ndx, dy: ndy, dist: 0 });
              bullets.push({ x: bx, y: by,
                dx: ndx * COS30 - ndy * SIN30, dy: ndx * SIN30 + ndy * COS30, dist: 0 });
              bullets.push({ x: bx, y: by,
                dx: ndx * COS30 + ndy * SIN30, dy: -ndx * SIN30 + ndy * COS30, dist: 0 });
              ammoBoxes = Math.max(0, ammoBoxes - 1);
              if (ammoBoxes === 0) weapon = 'default';
              fireCooldown = FIRE_COOLDOWN;
              updateAmmoMeter();
            } else if (weapon === 'long') {
              bullets.push({ x: bx, y: by, dx: ndx, dy: ndy, dist: 0, splits: 2, range: LONG_BULLET_RANGE });
              ammoBoxes = Math.max(0, ammoBoxes - 1);
              if (ammoBoxes === 0) weapon = 'default';
              fireCooldown = FIRE_COOLDOWN;
              updateAmmoMeter();
            } else {
              bullets.push({ x: bx, y: by, dx: ndx, dy: ndy, dist: 0 });
              if (weapon === 'tommy') {
                burstShot++;
                if (burstShot >= 3) {
                  burstShot  = 0;
                  ammoBoxes  = Math.max(0, ammoBoxes - 1);
                  if (ammoBoxes === 0) weapon = 'default';
                  fireCooldown = TOMMY_BURST_COOLDOWN;
                } else {
                  fireCooldown = TOMMY_SHOT_COOLDOWN;
                }
                updateAmmoMeter();
              } else {
                fireCooldown = FIRE_COOLDOWN;
              }
            }
            playPew();
          }
        } else {
          if (weapon === 'tommy') burstShot = 0;
        }

        if (fireCooldown > 0) fireCooldown--;
      }

      // ── Move bullets + cactus collision (always runs) ────────────────────────────
      const splitQueue = [];
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x    += b.dx;
        b.y    += b.dy;
        b.dist += BULLET_SPEED;

        const bRange = b.range || BULLET_RANGE;
        if (b.dist >= bRange) { bullets.splice(i, 1); continue; }

        if (b.splits > 0) {
          let rdx = b.dx, rdy = b.dy, wallHit = false;
          if (b.x < 3)       { b.x = 3;   rdx =  Math.abs(b.dx); wallHit = true; }
          if (b.x + 2 > 237) { b.x = 235; rdx = -Math.abs(b.dx); wallHit = true; }
          if (b.y < 3)       { b.y = 3;   rdy =  Math.abs(b.dy); wallHit = true; }
          if (b.y + 2 > 157) { b.y = 155; rdy = -Math.abs(b.dy); wallHit = true; }
          if (wallHit) {
            const spd = Math.sqrt(rdx * rdx + rdy * rdy);
            const ux = rdx / spd, uy = rdy / spd;
            const ns = b.splits - 1;
            const bx = b.x, by = b.y;
            bullets.splice(i, 1);
            splitQueue.push({ x: bx, y: by,
              dx: (ux * COS_DIV - uy * SIN_DIV) * spd,
              dy: (ux * SIN_DIV + uy * COS_DIV) * spd,
              dist: 0, splits: ns, range: LONG_BULLET_RANGE });
            splitQueue.push({ x: bx, y: by,
              dx: (ux * COS_DIV + uy * SIN_DIV) * spd,
              dy: (-ux * SIN_DIV + uy * COS_DIV) * spd,
              dist: 0, splits: ns, range: LONG_BULLET_RANGE });
            continue;
          }
        } else {
          if (b.x < 3)        { b.x = 3;   b.dx = Math.abs(b.dx);  }
          if (b.x + 2 > 237)  { b.x = 235; b.dx = -Math.abs(b.dx); }
          if (b.y < 3)        { b.y = 3;   b.dy = Math.abs(b.dy);  }
          if (b.y + 2 > 157)  { b.y = 155; b.dy = -Math.abs(b.dy); }
        }

        const bPoints = [[b.x, b.y],[b.x+1, b.y],[b.x, b.y+1],[b.x+1, b.y+1]];
        let hit = false;
        outer: for (let j = cacti.length - 1; j >= 0; j--) {
          const ca = cacti[j];
          for (const [px, py] of bPoints) {
            const hitC = Math.floor((px - ca.x) / CACTUS_SCALE);
            const hitR = Math.floor((py - ca.y) / CACTUS_SCALE);
            if (hitR >= 0 && hitR < CACTUS.length &&
                hitC >= 0 && hitC < CACTUS[0].length &&
                CACTUS[hitR][hitC] !== null && ca.damage[hitR][hitC]) {
              applyChunk(ca.damage, hitC, hitR, CHUNK_RADIUS);
              if (isCactusGone(ca.damage)) cacti.splice(j, 1);
              playDing();
              hit = true;
              break outer;
            }
          }
        }
        if (hit) { bullets.splice(i, 1); continue; }

        // ── Bullet vs AI ──────────────────────────────────────────────────────────
        if (ai.state === 'alive' || ai.state === 'sitting') {
          const aiH = ai.state === 'alive' ? 13 : 8;
          if (b.x + 2 > ai.x + 1 && b.x < ai.x + 7 &&
              b.y + 2 > ai.y + 2  && b.y < ai.y + 2 + aiH) {
            bullets.splice(i, 1);
            if (ai.state === 'alive') {
              ai.state       = 'sitting';
              ai.y           = AI_SIT_Y;
              ai.recoverTick = 0;
              playHit();
            } else {
              ai.state = 'dying';
              ai.y     = AI_DEAD_Y;
              playDeath();
            }
            continue;
          }
        }
      }
      if (splitQueue.length) bullets.push(...splitQueue);

      // ── AI sitting recovery timer ─────────────────────────────────────────────────
      if (ai.state === 'sitting') {
        ai.recoverTick++;
        if (ai.recoverTick >= AI_RECOVER_FRAMES) {
          ai.state       = 'alive';
          ai.y           = AI_STAND_Y;
          ai.recoverTick = 0;
        }
      }

      // ── AI death fade ─────────────────────────────────────────────────────────────
      if (ai.state === 'dying') {
        ai.fadeTick++;
        ai.fadeAlpha = 1 - ai.fadeTick / AI_FADE_FRAMES;
        if (ai.fadeTick >= AI_FADE_FRAMES) {
          ai.state     = 'dead';
          ai.fadeAlpha = 0;
        }
      }
    }

    // ── Teleportation circle ─────────────────────────────────────────────────────
    // Concentric pixel rings — muted/dim teal-blue, unobtrusive.

    function drawTeleport(gcx, gcy) {
      for (let dy = -9; dy <= 9; dy++) {
        for (let dx = -9; dx <= 9; dx++) {
          const d2 = dx * dx + dy * dy;
          if      (d2 >= 64 && d2 <= 81) dot(gcx + dx, gcy + dy, '#3E788C'); // outer ring
          else if (d2 >= 36 && d2 <= 49) dot(gcx + dx, gcy + dy, '#34708A'); // mid ring
          else if (d2 >= 16 && d2 <= 25) dot(gcx + dx, gcy + dy, '#5A96A8'); // inner ring
          else if (d2 <  16)             dot(gcx + dx, gcy + dy, '#4E869B'); // soft centre
        }
      }
    }

    // Pixel-art digit "3" — 3 × 5
    function drawDigit3(gx, gy, color) {
      dot(gx,   gy,   color); dot(gx+1, gy,   color); dot(gx+2, gy,   color); // ###
                                                        dot(gx+2, gy+1, color); //   #
                               dot(gx+1, gy+2, color); dot(gx+2, gy+2, color); //  ##
                                                        dot(gx+2, gy+3, color); //   #
      dot(gx,   gy+4, color); dot(gx+1, gy+4, color); dot(gx+2, gy+4, color); // ###
    }

    // Wide-shot power-up: vertical bullet + "3" label to the right
    function drawWideShotPU(gx, gy) {
      drawSprite(BULLET_PU, PAL_BULLET, gx, gy);
      drawDigit3(gx + 6, gy + 3, '#FFEE44');
    }

    // Long-shot power-up: green bullet + "L" label to the right
    function drawDigitL(gx, gy, color) {
      dot(gx, gy,   color);                                              // #
      dot(gx, gy+1, color);                                              // #
      dot(gx, gy+2, color);                                              // #
      dot(gx, gy+3, color);                                              // #
      dot(gx, gy+4, color); dot(gx+1, gy+4, color); dot(gx+2, gy+4, color); // ###
    }

    function drawLongShotPU(gx, gy) {
      drawSprite(BULLET_PU, PAL_BULLET_LONG, gx, gy);
      drawDigitL(gx + 6, gy + 3, '#44FF44');
    }

    // ── Pixel font ───────────────────────────────────────────────────────────────

    const PIXEL_FONT = {
      'R': ['##.','#.#','##.','#.#','#.#'],
      'O': ['###','#.#','#.#','#.#','###'],
      'U': ['#.#','#.#','#.#','#.#','###'],
      'N': ['#.#','##.','#.#','#.#','#.#'],
      'D': ['##.','#.#','#.#','#.#','##.'],
      ' ': ['..','..','..','..','..'],
      '1': ['##.','.#.','.#.','.#.','###'],
    };

    function drawPixelText(text, sx, sy, color, ps) {
      ctx.fillStyle = color;
      let cx = sx;
      for (const ch of text) {
        const glyph = PIXEL_FONT[ch] || PIXEL_FONT[' '];
        for (let r = 0; r < glyph.length; r++)
          for (let c = 0; c < glyph[r].length; c++)
            if (glyph[r][c] === '#')
              ctx.fillRect(cx + c * ps, sy + r * ps, ps, ps);
        cx += (glyph[0].length + 1) * ps;
      }
    }

    function pixelTextWidth(text, ps) {
      let w = 0;
      for (let i = 0; i < text.length; i++) {
        const glyph = PIXEL_FONT[text[i]] || PIXEL_FONT[' '];
        w += (glyph[0].length + (i < text.length - 1 ? 1 : 0)) * ps;
      }
      return w;
    }

    // ── Arena ────────────────────────────────────────────────────────────────────

    function drawArena() {
      const W = 240, H = 160;

      // Flat arena floor — top-down, no horizon, no ground plane
      grect(0, 0, W, H, '#8B6B20');

      // Subtle scatter texture
      for (let x = 4; x < W - 4; x += 4) {
        for (let y = 4; y < H - 4; y += 4) {
          if ((x * 11 + y *  7) % 23 < 2) dot(x, y, '#7A5C18');
          if ((x *  5 + y * 13) % 29 < 1) dot(x, y, '#9A7A28');
        }
      }

      // Outer boundary fence
      const PLANK = '#8B5C28', RAIL = '#6B4418', POST = '#3B2208';

      grect(0,     0, W, 3, PLANK); grect(0, 1, W, 1, RAIL); grect(0, 2, W, 1, POST); // top
      grect(0, H-3, W, 3, PLANK); grect(0, H-2, W, 1, RAIL); grect(0, H-1, W, 1, POST); // bottom
      grect(0,     0, 3, H, PLANK); grect(1, 0, 1, H, RAIL); grect(2, 0, 1, H, POST); // left
      grect(W-3,   0, 3, H, PLANK); grect(W-2, 0, 1, H, RAIL); grect(W-1, 0, 1, H, POST); // right

      for (let x = 0; x <= W - 3; x += 20) {
        grect(x, 0, 3, 4, POST); dot(x, 0, PLANK); dot(x+1, 0, PLANK);
        grect(x, H-4, 3, 4, POST); dot(x, H-1, PLANK); dot(x+1, H-1, PLANK);
      }
      for (let y = 0; y <= H - 3; y += 20) {
        grect(0, y, 4, 3, POST);
        grect(W-4, y, 4, 3, POST);
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────────

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawArena();

      // Teleportation circles
      drawTeleport(13, 147);
      drawTeleport(227, 13);

      // Cacti — rendered with live damage masks
      for (const ca of cacti)
        drawSprite(CACTUS, PAL_CACTUS, ca.x, ca.y, false, CACTUS_SCALE, ca.damage);

      // Dynamite packs (mines)
      drawSprite(DYNAMITE, PAL_DYNAMITE,  62,  14);
      drawSprite(DYNAMITE, PAL_DYNAMITE, 163,  14);
      drawSprite(DYNAMITE, PAL_DYNAMITE,  70, 124);

      // Tommy gun power-ups
      for (const tp of tommyPickups)
        drawSprite(TOMMY, PAL_TOMMY, tp.x, tp.y);

      // Wide-shot power-ups
      for (const wp of widePickups)
        drawWideShotPU(wp.x, wp.y);

      // Long-shot power-ups
      for (const lp of longPickups)
        drawLongShotPU(lp.x, lp.y);

      // Healing potion
      drawSprite(POTION, PAL_POTION, 24, 18);

      // Bullets
      ctx.fillStyle = '#FFFFFF';
      for (const b of bullets) {
        ctx.fillRect(Math.round(b.x) * S, Math.round(b.y) * S, 2 * S, 2 * S);
      }

      // Damsel — standing (13px tall; y aligns feet with arena bottom)
      drawSprite(DAMSEL, PAL_DAMSEL, 223, 71);  // y=71 → feet at 87, matches cowboy baseline

      // AI cowboy
      if (ai.state !== 'dead') {
        ctx.globalAlpha = ai.fadeAlpha;
        if      (ai.state === 'alive')   drawSprite(COWBOY,      PAL_P2, ai.x, ai.y, true);
        else if (ai.state === 'sitting') drawSprite(COWBOY_SIT,  PAL_P2, ai.x, ai.y, true);
        else                             drawSprite(COWBOY_DEAD, PAL_P2, ai.x, ai.y, true);
        ctx.globalAlpha = 1;
      }

      // Player 1 — animated (fades during teleport)
      ctx.globalAlpha = player.tpAlpha;
      drawSprite(COWBOY_FRAMES[player.animFrame], PAL_P1,
                 Math.round(player.x), Math.round(player.y),
                 player.facingLeft);
      if (weapon === 'tommy') {
        const hx = player.facingLeft
          ? Math.round(player.x) - 5
          : Math.round(player.x) + 7;
        drawSprite(TOMMY_HAND, PAL_TOMMY, hx, Math.round(player.y) + 6, player.facingLeft);
      }
      ctx.globalAlpha = 1;

      // HUD — round label (chunky pixel font, gold drop shadow, dark red)
      const ps = 6;
      const tw = pixelTextWidth('ROUND 1', ps);
      const sx = canvas.width  - tw - 3 * S - 8;
      const sy = 157 * S - 7 * ps - 8;
      drawPixelText('ROUND 1', sx + 3, sy + 3, '#FFD700', ps);
      drawPixelText('ROUND 1', sx,     sy,     '#8B0000', ps);
    }

    // ── Ammo meter ───────────────────────────────────────────────────────────────

    const ammoMeterEl = document.getElementById('ammo-meter');
    const ammoBoxEls  = [];
    for (let i = 0; i < 8; i++) {
      const box = document.createElement('div');
      box.style.cssText = 'width:24px;height:44px;background:#555555;border:2px solid #888888;border-radius:3px;';
      ammoMeterEl.appendChild(box);
      ammoBoxEls.push(box);
    }

    function updateAmmoMeter() {
      const active = weapon !== 'default';
      for (let i = 0; i < 8; i++) {
        const filled = i < ammoBoxes;
        ammoBoxEls[i].style.background    = filled ? (active ? '#CC2222' : '#555555') : '#1a1a1a';
        ammoBoxEls[i].style.borderColor   = filled ? (active ? '#FF5555' : '#888888') : '#333333';
      }
    }
    updateAmmoMeter();

    // ── Game loop ────────────────────────────────────────────────────────────────

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
